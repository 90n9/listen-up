<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ListenUp - Home (guideline)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: '#1B3A6B', teal: '#1AA9B0', orange: '#F58220',
          grass: '#5FBF3F', ring2: '#2E7DD1',
          canvas: '#F6F8FA', ink: '#243B53', mute: '#6B7E94',
        },
        fontFamily: {
          display: ['"Noto Sans Thai"', 'sans-serif'],
          sans: ['"IBM Plex Sans Thai"', 'sans-serif'],
        },
        boxShadow: {
          'card': '0 10px 30px -16px rgba(27,58,107,0.16), 0 4px 12px -8px rgba(27,58,107,0.08)',
          'shell': '0 40px 90px -40px rgba(27,58,107,0.22)',
        },
        transitionTimingFunction: { 'silk': 'cubic-bezier(0.22,1,0.36,1)' },
      },
    },
  };
</script>
<style>
  html, body { background: #E9EEF3; }
  body { font-family: 'IBM Plex Sans Thai', sans-serif; -webkit-font-smoothing: antialiased; color: #243B53; }
  .font-display { font-family: 'Noto Sans Thai', sans-serif; }
  .stage {
    background:
      radial-gradient(900px 520px at 88% -10%, rgba(26,169,176,0.08), transparent 60%),
      radial-gradient(820px 520px at 6% 110%, rgba(46,125,209,0.07), transparent 60%),
      linear-gradient(180deg, #EEF3F7 0%, #E6ECF2 100%);
  }
  .hero {
    background:
      radial-gradient(520px 320px at 85% 30%, rgba(26,169,176,0.10), transparent 65%),
      linear-gradient(180deg, #F4FBFC 0%, #ECF6F8 100%);
  }
  .tap { transition: transform .42s cubic-bezier(0.22,1,0.36,1), box-shadow .42s cubic-bezier(0.22,1,0.36,1), background-color .3s ease; }
  .tap:hover { transform: translateY(-2px); }
  .tap:active { transform: scale(0.985); }
  @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation:none!important; transition:none!important; } }
</style>
</head>
<body class="stage min-h-screen">

  <div class="mx-auto max-w-[1180px] px-4 py-6 lg:py-10">
    <div class="bg-white rounded-[28px] lg:rounded-[36px] shadow-shell ring-1 ring-navy/5 overflow-hidden">

      <!-- ===== Header ===== -->
      <header class="flex items-center justify-between px-5 lg:px-9 py-4 lg:py-5 border-b border-navy/5">
        <img src="../logo.png" alt="ListenUp" class="h-9 lg:h-11 w-auto object-contain" />
        <nav class="hidden lg:block">
          <a href="#" class="text-[15px] font-semibold text-mute hover:text-navy transition-colors">เกี่ยวกับเรา</a>
        </nav>
        <button class="lg:hidden h-10 w-10 rounded-xl flex items-center justify-center text-navy hover:bg-canvas transition-colors" aria-label="เมนู">
          <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </header>

      <!-- ===== Hero ===== -->
      <section class="hero px-5 lg:px-9 pt-7 pb-9 lg:py-12">
        <div class="grid lg:grid-cols-2 gap-8 items-center">
          <div class="order-2 lg:order-1">
            <h1 class="font-display text-[30px] leading-[1.18] lg:text-[46px] lg:leading-[1.12] font-extrabold tracking-tight text-navy">
              ฝึกฟังกับลูกวันละ <span class="text-teal">5</span> นาที
            </h1>
            <p class="mt-3 lg:mt-4 text-[15px] lg:text-[18px] leading-relaxed text-mute max-w-[26rem]">
              ฟังเรื่องราว แล้วตอบคำถาม สนุกง่าย ได้ทุกวัน
            </p>
            <button class="tap mt-6 lg:mt-8 inline-flex items-center gap-2.5 rounded-full bg-teal text-white pl-2 pr-7 py-2 lg:py-2.5 text-[17px] lg:text-[19px] font-bold shadow-card hover:bg-[#159aa1]">
              <span class="h-9 w-9 lg:h-11 lg:w-11 rounded-full bg-white/25 flex items-center justify-center">
                <svg class="w-5 h-5 lg:w-6 lg:h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              </span>
              เริ่มฝึกเลย
            </button>
          </div>
          <div class="order-1 lg:order-2 flex justify-center lg:justify-end">
            <div class="relative w-full max-w-[360px] lg:max-w-[440px]">
              <div class="absolute inset-0 -m-4 rounded-[40px] bg-white/40 blur-2xl"></div>
              <img src="../logo.png" alt="" class="relative w-full object-contain" style="clip-path: inset(2% 0 38% 0);" />
            </div>
          </div>
        </div>
      </section>

      <div class="px-5 lg:px-9 pb-9 lg:pb-12 pt-7 lg:pt-9">

        <!-- ===== Mode cards ===== -->
        <div class="flex items-center gap-2.5 mb-4 lg:mb-5">
          <span class="h-8 w-8 rounded-lg bg-teal/10 flex items-center justify-center text-teal">
            <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="14" height="14" rx="2"/><path d="M21 7v12a2 2 0 0 1-2 2H7"/></svg>
          </span>
          <h2 class="font-display text-[19px] lg:text-[22px] font-bold text-navy">เลือกการ์ดเพื่อเล่น</h2>
        </div>

        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3.5 lg:gap-4">
          <!-- เรื่องสั้น -->
          <button class="tap group text-left rounded-2xl bg-white ring-1 ring-navy/8 shadow-card p-4 lg:p-5 flex items-center gap-4 hover:ring-teal/30">
            <span class="shrink-0 h-12 w-12 lg:h-14 lg:w-14 rounded-2xl bg-teal/12 flex items-center justify-center text-teal">
              <svg class="w-6 h-6 lg:w-7 lg:h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5h7a3 3 0 0 1 3 3v11a2.5 2.5 0 0 0-2.5-2.5H2z"/><path d="M22 5h-7a3 3 0 0 0-3 3v11a2.5 2.5 0 0 1 2.5-2.5H22z"/></svg>
            </span>
            <div class="min-w-0 flex-1">
              <p class="font-display text-[17px] lg:text-[18px] font-bold text-navy">เรื่องสั้น</p>
              <p class="text-[13px] lg:text-[13.5px] text-mute leading-snug">ฟังเรื่องสั้น แล้วตอบคำถาม</p>
            </div>
            <span class="shrink-0 h-10 w-10 rounded-full bg-teal flex items-center justify-center text-white shadow-card group-hover:scale-105 transition-transform">
              <svg class="w-4 h-4 ml-0.5" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </span>
          </button>
          <!-- คำถาม -->
          <button class="tap group text-left rounded-2xl bg-white ring-1 ring-navy/8 shadow-card p-4 lg:p-5 flex items-center gap-4 hover:ring-grass/30">
            <span class="shrink-0 h-12 w-12 lg:h-14 lg:w-14 rounded-2xl bg-grass/14 flex items-center justify-center text-[#4a9e2f]">
              <svg class="w-6 h-6 lg:w-7 lg:h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.9-.9L3 21l1.9-5.6A8.5 8.5 0 1 1 21 11.5z"/><path d="M9.5 9a2.5 2.5 0 1 1 3 2.5c-.6.2-1 .8-1 1.5"/><path d="M12 17h.01"/></svg>
            </span>
            <div class="min-w-0 flex-1">
              <p class="font-display text-[17px] lg:text-[18px] font-bold text-navy">คำถาม</p>
              <p class="text-[13px] lg:text-[13.5px] text-mute leading-snug">ฝึกตอบคำถามหลากหลายรูปแบบ</p>
            </div>
            <span class="shrink-0 h-10 w-10 rounded-full bg-grass flex items-center justify-center text-white shadow-card group-hover:scale-105 transition-transform">
              <svg class="w-4 h-4 ml-0.5" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </span>
          </button>
          <!-- สุ่มการ์ด -->
          <button class="tap group text-left rounded-2xl bg-white ring-1 ring-navy/8 shadow-card p-4 lg:p-5 flex items-center gap-4 hover:ring-orange/30">
            <span class="shrink-0 h-12 w-12 lg:h-14 lg:w-14 rounded-2xl bg-orange/12 flex items-center justify-center text-orange">
              <svg class="w-6 h-6 lg:w-7 lg:h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
            </span>
            <div class="min-w-0 flex-1">
              <p class="font-display text-[17px] lg:text-[18px] font-bold text-navy">สุ่มการ์ด</p>
              <p class="text-[13px] lg:text-[13.5px] text-mute leading-snug">สุ่มเรื่องหรือสุ่มคำถามมาทดลองเล่น</p>
            </div>
            <span class="shrink-0 h-10 w-10 rounded-full bg-orange flex items-center justify-center text-white shadow-card group-hover:scale-105 transition-transform">
              <svg class="w-4 h-4 ml-0.5" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </span>
          </button>
        </div>

        <!-- ===== Recently played ===== -->
        <div class="flex items-center justify-between mt-9 lg:mt-11 mb-4 lg:mb-5">
          <div class="flex items-center gap-2.5">
            <span class="h-8 w-8 rounded-lg bg-ring2/10 flex items-center justify-center text-ring2">
              <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            </span>
            <h2 class="font-display text-[19px] lg:text-[22px] font-bold text-navy">เล่นล่าสุด</h2>
          </div>
          <a href="#" class="inline-flex items-center gap-1 text-[14px] font-semibold text-ring2 hover:text-navy transition-colors">
            ดูทั้งหมด
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </a>
        </div>

        <div class="grid sm:grid-cols-2 gap-3.5 lg:gap-4">
          <button class="tap text-left rounded-2xl bg-canvas ring-1 ring-navy/8 p-4 flex items-center gap-3.5 hover:bg-white hover:ring-teal/25 hover:shadow-card">
            <span class="shrink-0 h-11 w-11 rounded-xl bg-teal/12 flex items-center justify-center text-teal">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l1-4h16l1 4"/><path d="M4 9v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9"/><path d="M3 9h18"/></svg>
            </span>
            <div class="min-w-0 flex-1">
              <p class="font-display text-[16px] font-bold text-navy truncate">ย่าไปตลาด</p>
              <p class="text-[12.5px] text-mute">เรื่องสั้น</p>
            </div>
            <span class="text-[12.5px] text-mute whitespace-nowrap">เมื่อวานนี้</span>
            <svg class="w-4 h-4 text-mute/60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </button>
          <button class="tap text-left rounded-2xl bg-canvas ring-1 ring-navy/8 p-4 flex items-center gap-3.5 hover:bg-white hover:ring-grass/25 hover:shadow-card">
            <span class="shrink-0 h-11 w-11 rounded-xl bg-grass/14 flex items-center justify-center text-[#4a9e2f]">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14c4 5 11 6 16 1"/><path d="M19 15c2-3 2-8-1-11"/></svg>
            </span>
            <div class="min-w-0 flex-1">
              <p class="font-display text-[16px] font-bold text-navy truncate">เปลือกกล้วย</p>
              <p class="text-[12.5px] text-mute">คำถาม</p>
            </div>
            <span class="text-[12.5px] text-mute whitespace-nowrap">2 วันแล้ว</span>
            <svg class="w-4 h-4 text-mute/60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
